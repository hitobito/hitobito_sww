name: 'Lint and test'

on:
  # The nightly obuild allows us to notice if changes to the core
  # break the wagon.
  schedule:
  - cron:  '38 3 * * *'
  push:
    paths-ignore:
      - 'doc/**'
      - '**.md'
  pull_request:
    paths-ignore:
      - 'doc/**'
      - '**.md'
jobs:
  wagon_tests:
    uses: hitobito/hitobito/.github/workflows/wagon-tests.yml@bug/1642_fix_wagon_cron_job
    # steps:
    #   - name: Find repository name
    #     id: find_repository_name
    #     run: |
    #       echo "::set-output name=repository_name::$(${${{github.repository}}##*/})"
    with:
      # wagon_repository: ${{ steps.find_repository_name.outputs.repository_name }}
      wagon_repository: ${{ github.repository }}
